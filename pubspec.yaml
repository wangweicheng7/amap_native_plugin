name: amap_native_plugin
description: Flutter plugin for embedding native AMap views with circle geofence drawing on Android and iOS.
version: 0.0.1
homepage: https://pub.dev/packages/amap_native_plugin
repository: https://github.com/wangweicheng7/amap_native_plugin.git
topics:
  - amap
  - map
  - geofence
  - location

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.origin.amap_native_plugin
        pluginClass: AmapNativePlugin
      ios:
        pluginClass: AmapNativePlugin
